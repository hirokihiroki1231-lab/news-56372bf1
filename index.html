<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#0b1020" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ニュース" />
  <title>毎日ニュースまとめ</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <h1>📰 今日の主要ニュース</h1>
      <button id="refreshBtn" class="refresh" aria-label="再読み込み">⟳</button>
    </div>
    <p id="updatedAt" class="updated"></p>
  </header>

  <nav id="dateTabs" class="date-tabs" aria-label="日付選択"></nav>

  <main id="content" class="content">
    <div class="loading">読み込み中…</div>
  </main>

  <footer class="app-footer">
    <span>事実ベースで自動要約。確度の低い情報は「未確認」と表記。</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
